<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1115" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <title>Inventario visual de filamentos</title>
</head>
<body>
  <div class="page">
    <section class="visual-board">
      <div id="amsRow" class="ams-row"></div>
      <div class="shelves-row">
        <div class="shelf-panel">
          <div class="shelf-title">Estantería *1</div>
          <div id="shelf1Visual" class="shelf-visual"></div>
        </div>
        <div class="shelf-panel">
          <div class="shelf-title">Estantería *2</div>
          <div id="shelf2Visual" class="shelf-visual"></div>
        </div>
      </div>
    </section>

    <section class="editor-panel">
      <div class="panel-head">
        <div>
          <h2>Inventario editable</h2>
          <p>Cambia fabricante, material, variante, color, ubicación y hueco. El dibujo se actualiza al instante.</p>
        </div>
        <div class="panel-actions">
          <button id="addRowBtn" class="btn btn-primary">Añadir fila</button>
          <button id="resetBtn" class="btn">Reiniciar demo</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Fabricante</th>
              <th>Material general</th>
              <th>Variante</th>
              <th>Color</th>
              <th>Ubicación</th>
              <th>Hueco</th>
              <th>Estado</th>
              <th>Notas</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="inventoryBody"></tbody>
        </table>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
